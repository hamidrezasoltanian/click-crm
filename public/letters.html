<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دبیرخونه — آتنا زیست درمان</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#eef2f7;--surface:#fff;--surface2:#f8fafc;--surface3:#f1f5f9;
  --sb:#0f1f35;--sb2:#162840;--sb-text:#94a3b8;--sb-act:#38bdf8;--sb-act-bg:rgba(56,189,248,.12);
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --primary:#0284c7;--primary-d:#0369a1;
  --success:#16a34a;--success-d:#15803d;
  --warn:#ea580c;--warn-d:#c2410c;
  --danger:#dc2626;--danger-d:#b91c1c;
  --purple:#7c3aed;--teal:#0d9488;
  --r:8px;--r2:12px;--r3:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow2:0 4px 16px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --shadow3:0 20px 60px rgba(0,0,0,.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:230px;min-width:230px;background:var(--sb);display:flex;flex-direction:column;overflow-y:auto;z-index:10;}
.content-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow);}
.main{flex:1;overflow-y:auto;padding:24px;}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo .brand{font-size:13px;font-weight:800;color:#fff;letter-spacing:.3px;}
.sb-logo .ver{font-size:10px;color:var(--sb-text);margin-top:2px;}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px;}
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#fff;background:#0284c7;}
.sb-uname{font-size:12px;font-weight:600;color:#fff;}
.sb-urole{font-size:10px;color:var(--sb-text);}
.sb-sect{padding:12px 0 4px;}
.sb-lbl{font-size:9px;font-weight:700;color:rgba(148,163,184,.5);padding:4px 16px;letter-spacing:1px;text-transform:uppercase;}
.nav{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;font-size:12.5px;color:var(--sb-text);border-right:3px solid transparent;transition:all .15s;margin:1px 0;border-radius:0;}
.nav:hover{background:rgba(255,255,255,.05);color:#e2e8f0;}
.nav.act{background:var(--sb-act-bg);color:var(--sb-act);border-right-color:var(--sb-act);font-weight:600;}
.nav .ico{font-size:14px;width:18px;text-align:center;flex-shrink:0;}
.nav .lbl{flex:1;}
.nb{margin-right:auto;background:var(--danger);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center;}
.tb-title{font-size:16px;font-weight:700;}
.tb-sub{font-size:11px;color:var(--text3);margin-top:1px;}
.tb-actions{display:flex;align-items:center;gap:8px;}
.page{display:none;}.page.act{display:block;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;}
.pt{font-size:18px;font-weight:800;}
.ps{font-size:12px;color:var(--text3);margin-top:2px;}
.pa{display:flex;gap:8px;flex-shrink:0;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--primary);color:#fff;}.btn-primary:hover{background:var(--primary-d);}
.btn-success{background:var(--success);color:#fff;}.btn-success:hover{background:var(--success-d);}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:hover{background:var(--danger-d);}
.btn-warn{background:var(--warn);color:#fff;}.btn-warn:hover{background:var(--warn-d);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}.btn-ghost:hover{background:var(--surface3);color:var(--text);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:16px;box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;}
th{background:var(--surface2);padding:9px 12px;font-size:11px;font-weight:700;color:var(--text3);text-align:right;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:hover td{background:var(--surface2);}
tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg{background:#dcfce7;color:#15803d;}.br{background:#fee2e2;color:#b91c1c;}.by{background:#fff7ed;color:#c2410c;}
.bb{background:#eff6ff;color:#1d4ed8;}.bp{background:#f5f3ff;color:#6d28d9;}.bgr{background:var(--surface3);color:var(--text2);}
.bpu{background:#fef3c7;color:#92400e;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.2px;}
.fl .req{color:var(--danger);}
.fi,.fs,.fta{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:8px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s;width:100%;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(2,132,199,.1);}
.fta{resize:vertical;min-height:100px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fa{display:flex;gap:8px;margin-top:8px;}
.mo{display:none;position:fixed;inset:0;background:rgba(15,31,53,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.mo.open{display:flex;}
.md{background:var(--surface);border-radius:var(--r3);width:640px;max-width:95vw;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow3);}
.md.wide{width:820px;}
.mh{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1;}
.mt-m{font-size:15px;font-weight:800;}
.mx{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px;line-height:1;}
.mx:hover{background:var(--surface3);color:var(--text);}
.mb{padding:20px;}
.mf{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;background:var(--surface2);border-radius:0 0 var(--r3) var(--r3);}
.search-row{display:flex;gap:8px;margin-bottom:14px;}
.si{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:8px 12px;font-family:inherit;font-size:13px;outline:none;}
.si:focus{border-color:var(--primary);}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:18px;}
.tab{padding:8px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;background:none;border-top:none;border-right:none;border-left:none;font-family:inherit;font-weight:500;}
.tab:hover{color:var(--text);}
.tab.act{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;}
.empty{text-align:center;padding:48px;color:var(--text3);}
.empty .ei{font-size:36px;margin-bottom:10px;}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.tw{overflow-x:auto;}
/* Timeline */
.timeline{padding:16px 0;}
.tl-item{display:flex;gap:12px;margin-bottom:16px;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;right:15px;top:32px;bottom:-4px;width:2px;background:var(--border);}
.tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:2px solid var(--border);}
.tl-body{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;}
.tl-who{font-size:12px;font-weight:700;color:var(--text);}
.tl-when{font-size:10px;color:var(--text3);margin-right:8px;}
.tl-desc{font-size:12px;color:var(--text2);margin-top:4px;}
.tl-acts{display:flex;gap:6px;margin-top:6px;}
/* Letter body display */
.letter-body{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px;font-size:14px;line-height:2;white-space:pre-wrap;min-height:120px;}
/* Print */
@media print{
  .app,.topbar,.sidebar{display:none!important;}
  #pz{display:block!important;}
  body{background:#fff!important;}
}
#pz{display:none;font-family:'Vazirmatn',sans-serif;direction:rtl;padding:24px;color:#000;}
.pz-border{border:2px solid #000;border-radius:4px;padding:0;}
.pz-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:2px solid #000;}
.pz-company{font-size:16px;font-weight:800;}
.pz-sub{font-size:11px;color:#555;margin-top:2px;}
.pz-indicator{border:2px solid #000;padding:8px 14px;text-align:center;min-width:180px;border-radius:4px;}
.pz-ind-no{font-size:20px;font-weight:800;font-family:monospace;}
.pz-ind-date{font-size:11px;color:#333;margin-top:2px;}
.pz-type-bar{text-align:center;font-size:20px;font-weight:800;padding:8px;border-bottom:1px solid #ccc;background:#f0f0f0;}
.pz-meta{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;padding:12px 16px;border-bottom:1px solid #ccc;font-size:12px;}
.pz-meta-row{display:flex;gap:8px;}
.pz-meta-key{font-weight:700;min-width:100px;}
.pz-body-sec{padding:14px 16px;border-bottom:1px solid #ccc;font-size:13px;line-height:2;min-height:120px;white-space:pre-wrap;}
.pz-sigs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:16px;}
.pz-sig{text-align:center;}
.pz-sig-title{font-size:12px;font-weight:800;margin-bottom:3px;}
.pz-sig-name{font-size:11px;color:#555;margin-bottom:40px;}
.pz-sig-line{border-top:1px solid #000;padding-top:6px;font-size:10px;color:#555;}
/* Mobile */
.ham-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text);padding:4px 8px;border-radius:var(--r);}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:498;}
.sb-overlay.mob-open{display:block;}
@media(max-width:820px){
  .ham-btn{display:flex;align-items:center;}
  .sidebar{position:fixed!important;right:-240px!important;top:0!important;height:100%!important;z-index:500!important;transition:right .25s ease!important;}
  .sidebar.mob-open{right:0!important;}
  .content-wrap{width:100%;}
  .topbar{padding:0 14px!important;}
  .main{padding:12px!important;}
  .md{width:96vw!important;}
  .form-grid,.form-grid-2{grid-template-columns:1fr!important;}
  th,td{padding:6px 8px!important;font-size:12px!important;}
}
</style>
</head>
<body>

<div id="pz"></div>
<div id="sb-overlay" class="sb-overlay" onclick="closeSidebar()"></div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="brand">📬 دبیرخونه</div>
      <div class="ver">آتنا زیست درمان</div>
    </div>
    <div class="sb-user">
      <div class="av" id="sbAvatar">؟</div>
      <div>
        <div class="sb-uname" id="sbName">در حال بارگذاری...</div>
        <div class="sb-urole" id="sbRole">—</div>
      </div>
    </div>

    <div class="sb-sect">
      <div class="sb-lbl">کارتابل</div>
      <div class="nav act" id="nav-inbox" onclick="go('inbox')">
        <span class="ico">📥</span>
        <span class="lbl">کارتابل من</span>
        <span class="nb" id="inboxBadge" style="display:none">0</span>
      </div>
    </div>

    <div class="sb-sect">
      <div class="sb-lbl">نامه‌ها</div>
      <div class="nav" id="nav-outgoing" onclick="go('outgoing')">
        <span class="ico">📤</span>
        <span class="lbl">صادره</span>
      </div>
      <div class="nav" id="nav-incoming" onclick="go('incoming')">
        <span class="ico">📨</span>
        <span class="lbl">وارده</span>
      </div>
      <div class="nav" id="nav-internal" onclick="go('internal')">
        <span class="ico">🏢</span>
        <span class="lbl">داخلی</span>
      </div>
      <div class="nav" id="nav-archived" onclick="go('archived')">
        <span class="ico">🗄️</span>
        <span class="lbl">بایگانی</span>
      </div>
    </div>

    <div class="sb-sect">
      <div class="sb-lbl">ابزار</div>
      <div class="nav" id="nav-templates" onclick="go('templates')">
        <span class="ico">📋</span>
        <span class="lbl">قالب‌ها</span>
      </div>
    </div>

    <div class="sb-sect" style="margin-top:auto;padding-bottom:12px;">
      <div class="nav" onclick="window.location='/'">
        <span class="ico">🏠</span>
        <span class="lbl">بازگشت به CRM</span>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="content-wrap">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px;">
        <button class="ham-btn" onclick="toggleSidebar()">☰</button>
        <div>
          <div class="tb-title" id="tbTitle">کارتابل من</div>
          <div class="tb-sub" id="tbSub">—</div>
        </div>
      </div>
      <div class="tb-actions">
        <button class="btn btn-primary btn-sm" onclick="openLetterNew()">+ نامه جدید</button>
      </div>
    </div>

    <div class="main">
      <div class="page act" id="p-inbox"></div>
      <div class="page" id="p-outgoing"></div>
      <div class="page" id="p-incoming"></div>
      <div class="page" id="p-internal"></div>
      <div class="page" id="p-archived"></div>
      <div class="page" id="p-templates"></div>
    </div>
  </div>
</div>

<!-- Modal: New/Edit Letter -->
<div class="mo" id="mo-letter">
  <div class="md wide">
    <div class="mh">
      <span class="mt-m" id="mo-letter-title">نامه جدید</span>
      <button class="mx" onclick="closeMo('mo-letter')">✕</button>
    </div>
    <div class="mb" id="mo-letter-body"></div>
    <div class="mf" id="mo-letter-footer"></div>
  </div>
</div>

<!-- Modal: View Letter -->
<div class="mo" id="mo-view">
  <div class="md wide">
    <div class="mh">
      <span class="mt-m" id="mo-view-title">مشاهده نامه</span>
      <button class="mx" onclick="closeMo('mo-view')">✕</button>
    </div>
    <div class="mb" id="mo-view-body"></div>
    <div class="mf" id="mo-view-footer"></div>
  </div>
</div>

<!-- Modal: Refer -->
<div class="mo" id="mo-refer">
  <div class="md" style="width:460px;">
    <div class="mh">
      <span class="mt-m">ارجاع نامه</span>
      <button class="mx" onclick="closeMo('mo-refer')">✕</button>
    </div>
    <div class="mb" id="mo-refer-body"></div>
    <div class="mf">
      <button class="btn btn-ghost btn-sm" onclick="closeMo('mo-refer')">انصراف</button>
      <button class="btn btn-primary btn-sm" onclick="_submitRefer()">ارجاع</button>
    </div>
  </div>
</div>

<!-- Modal: Register (issue indicator) -->
<div class="mo" id="mo-register">
  <div class="md" style="width:420px;">
    <div class="mh">
      <span class="mt-m">صدور شماره اندیکاتور</span>
      <button class="mx" onclick="closeMo('mo-register')">✕</button>
    </div>
    <div class="mb" id="mo-register-body"></div>
    <div class="mf">
      <button class="btn btn-ghost btn-sm" onclick="closeMo('mo-register')">انصراف</button>
      <button class="btn btn-success btn-sm" onclick="_submitRegister()">صدور شماره</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────
var S = {
  user: null,
  users: [],
  page: 'inbox',
  letters: [],
  editId: null,
  referLetterId: null,
  registerLetterId: null,
};

var PAGE_TITLES = {
  inbox: 'کارتابل من',
  outgoing: 'صادره',
  incoming: 'وارده',
  internal: 'داخلی',
  archived: 'بایگانی',
  templates: 'قالب‌ها',
};

// ── Auth token ─────────────────────────────────────────────────────────────
function getToken() {
  var m = document.cookie.match(/(?:^|;\s*)atena_token=([^;]+)/);
  return m ? m[1] : '';
}

async function api(method, path, body) {
  var opts = {
    method: method,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + getToken() },
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  var res = await fetch('/api' + path, opts);
  var data = await res.json().catch(function() { return {}; });
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function init() {
  try {
    S.user = await api('GET', '/auth/me');
  } catch(e) {
    window.location = '/';
    return;
  }
  document.getElementById('sbName').textContent = S.user.name || S.user.username;
  document.getElementById('sbRole').textContent = S.user.role || '';
  document.getElementById('sbAvatar').textContent = (S.user.name || S.user.username || '?')[0];

  try {
    var usersRes = await api('GET', '/users');
    S.users = Array.isArray(usersRes) ? usersRes : (usersRes.users || []);
  } catch(e) { S.users = []; }

  await loadCounts();
  go('inbox');
}

async function loadCounts() {
  try {
    var r = await api('GET', '/letters/counts');
    var badge = document.getElementById('inboxBadge');
    if (r.unread > 0) {
      badge.textContent = r.unread;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  } catch(e) {}
}

// ── Navigation ─────────────────────────────────────────────────────────────
function go(page) {
  S.page = page;
  document.querySelectorAll('.nav').forEach(function(n) { n.classList.remove('act'); });
  var navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('act');
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('act'); });
  var pageEl = document.getElementById('p-' + page);
  if (pageEl) pageEl.classList.add('act');
  document.getElementById('tbTitle').textContent = PAGE_TITLES[page] || page;
  renderPage(page);
}

function renderPage(page) {
  if (page === 'inbox') renderInbox();
  else if (page === 'templates') renderTemplates();
  else renderLetterList(page);
}

// ── Inbox (کارتابل) ────────────────────────────────────────────────────────
async function renderInbox() {
  var el = document.getElementById('p-inbox');
  el.innerHTML = '<div class="empty"><div class="ei">⏳</div>در حال بارگذاری...</div>';
  try {
    var rows = await api('GET', '/letters/cartable');
    if (!rows.length) {
      el.innerHTML = '<div class="empty"><div class="ei">📥</div><div>کارتابل شما خالی است</div></div>';
      return;
    }
    var html = '<div class="tw"><table><thead><tr>' +
      '<th>موضوع</th><th>نوع</th><th>اولویت</th><th>از</th><th>نوع ارجاع</th><th>تاریخ</th><th>وضعیت</th><th></th>' +
      '</tr></thead><tbody>';
    rows.forEach(function(r) {
      var read = r.is_read ? '' : ' style="font-weight:700;"';
      html += '<tr' + read + '>' +
        '<td onclick="openLetterView(\'' + r.letter_id + '\')" style="cursor:pointer;">' +
          (r.is_read ? '' : '<span style="color:var(--primary);margin-left:4px;">●</span>') + esc(r.subject || '—') + '</td>' +
        '<td>' + typeBadge(r.type) + '</td>' +
        '<td>' + prioBadge(r.priority) + '</td>' +
        '<td>' + esc(r.from_user) + '</td>' +
        '<td>' + actionTypeBadge(r.action_type) + '</td>' +
        '<td style="font-size:11px;">' + fmtDate(r.created_at) + '</td>' +
        '<td>' + (r.is_completed ? '<span class="badge bg">اتمام یافت</span>' : '<span class="badge bb">در جریان</span>') + '</td>' +
        '<td><button class="btn btn-ghost btn-xs" onclick="openLetterView(\'' + r.letter_id + '\')">مشاهده</button></td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;
    loadCounts();
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="ei">⚠️</div>' + esc(e.message) + '</div>';
  }
}

// ── Letter List ────────────────────────────────────────────────────────────
async function renderLetterList(page) {
  var el = document.getElementById('p-' + page);
  el.innerHTML = '<div class="empty"><div class="ei">⏳</div>در حال بارگذاری...</div>';
  try {
    var params = '';
    if (page === 'outgoing') params = '?type=outgoing';
    else if (page === 'incoming') params = '?type=incoming';
    else if (page === 'internal') params = '?type=internal';
    else if (page === 'archived') params = '?status=archived';

    var rows = await api('GET', '/letters' + params);
    if (page !== 'archived') rows = rows.filter(function(r) { return r.status !== 'archived'; });

    var isManager = S.user && (S.user.role === 'مدیر' || S.user.role === 'سوپر ادمین');

    var html = '<div class="search-row"><input class="si" id="search-' + page + '" placeholder="جستجو در موضوع..." oninput="filterTable(\'' + page + '\')" /></div>';
    html += '<div class="tw"><table id="tbl-' + page + '"><thead><tr>' +
      '<th>شماره</th><th>موضوع</th><th>نوع</th><th>اولویت</th><th>وضعیت</th><th>سازنده</th><th>تاریخ</th><th></th>' +
      '</tr></thead><tbody>';

    if (!rows.length) {
      html += '<tr><td colspan="8" class="empty">نامه‌ای یافت نشد</td></tr>';
    } else {
      rows.forEach(function(r) {
        html += '<tr data-subject="' + esc(r.subject) + '">' +
          '<td><code>' + esc(r.indicatorNumber || '—') + '</code></td>' +
          '<td onclick="openLetterView(\'' + r.id + '\')" style="cursor:pointer;font-weight:600;">' + esc(r.subject) + '</td>' +
          '<td>' + typeBadge(r.type) + '</td>' +
          '<td>' + prioBadge(r.priority) + '</td>' +
          '<td>' + statusBadge(r.status) + '</td>' +
          '<td style="font-size:12px;">' + esc(r.createdBy || '') + '</td>' +
          '<td style="font-size:11px;">' + fmtDate(r.createdAt) + '</td>' +
          '<td style="white-space:nowrap;">' +
            '<button class="btn btn-ghost btn-xs" onclick="openLetterView(\'' + r.id + '\')">مشاهده</button>' +
            (r.status === 'draft' ? ' <button class="btn btn-ghost btn-xs" onclick="openLetterEdit(\'' + r.id + '\')">ویرایش</button>' : '') +
          '</td>' +
          '</tr>';
      });
    }
    html += '</tbody></table></div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="ei">⚠️</div>' + esc(e.message) + '</div>';
  }
}

function filterTable(page) {
  var q = (document.getElementById('search-' + page).value || '').toLowerCase();
  var rows = document.querySelectorAll('#tbl-' + page + ' tbody tr');
  rows.forEach(function(r) {
    var subj = (r.dataset.subject || '').toLowerCase();
    r.style.display = (!q || subj.includes(q)) ? '' : 'none';
  });
}

// ── Templates ──────────────────────────────────────────────────────────────
async function renderTemplates() {

      rows.forEach(function(r) {
        html += '<tr><td style="font-weight:600;">' + esc(r.title) + '</td>' +
          '<td>' + (r.type ? typeBadge(r.type) : '—') + '</td>' +
          '<td style="font-size:11px;">' + fmtDate(r.created_at) + '</td>' +
          '<td><button class="btn btn-ghost btn-xs" onclick="useTemplate(' + JSON.stringify(r).replace(/"/g, '&quot;') + ')">استفاده</button>' +

var _templateNew = false;
function openTemplateNew() {
  _templateNew = true;
  document.getElementById('mo-letter-title').textContent = 'قالب جدید';
  document.getElementById('mo-letter-body').innerHTML = buildLetterForm(null, true);
  document.getElementById('mo-letter-footer').innerHTML =
    '<button class="btn btn-ghost btn-sm" onclick="closeMo(\'mo-letter\')">انصراف</button>' +
    '<button class="btn btn-success btn-sm" onclick="_submitTemplate()">ذخیره قالب</button>';
  openMo('mo-letter');
}

function useTemplate(tpl) {
  _templateNew = false;
  S.editId = null;
  document.getElementById('mo-letter-title').textContent = 'نامه جدید از قالب';
  document.getElementById('mo-letter-body').innerHTML = buildLetterForm(null, false, tpl);
  document.getElementById('mo-letter-footer').innerHTML = buildLetterFooter(null);
  openMo('mo-letter');
}

async function deleteTemplate(id) {
  if (!confirm('این قالب حذف شود؟')) return;
  try {
    await api('DELETE', '/letters/templates/' + id);
    renderTemplates();
  } catch(e) { alert(e.message); }
}

async function _submitTemplate() {
  var data = collectLetterForm();
  if (!data.title) return alert('عنوان قالب الزامی است');
  try {
    await api('POST', '/letters/templates', { title: data.title || data.subject, type: data.type, body: data.body });
    closeMo('mo-letter');
    renderTemplates();
  } catch(e) { alert(e.message); }
}

// ── Create / Edit Letter ───────────────────────────────────────────────────
function openLetterNew() {
  _templateNew = false;
  S.editId = null;
  document.getElementById('mo-letter-title').textContent = 'نامه جدید';
  document.getElementById('mo-letter-body').innerHTML = buildLetterForm(null);
  document.getElementById('mo-letter-footer').innerHTML = buildLetterFooter(null);
  openMo('mo-letter');
}

async function openLetterEdit(id) {
  _templateNew = false;
  S.editId = id;
  try {
    var letter = await api('GET', '/letters/' + id);
    document.getElementById('mo-letter-title').textContent = 'ویرایش نامه';
    document.getElementById('mo-letter-body').innerHTML = buildLetterForm(letter);
    document.getElementById('mo-letter-footer').innerHTML = buildLetterFooter(letter);
    openMo('mo-letter');
  } catch(e) { alert(e.message); }
}

function buildLetterForm(letter, isTemplate, tpl) {
  var type = (letter && letter.type) || (tpl && tpl.type) || 'outgoing';
  var subj = (letter && letter.subject) || (tpl && tpl.title) || '';
  var body = (letter && letter.body) || (tpl && tpl.body) || '';
  var prio = (letter && letter.priority) || 'normal';
  var cls  = (letter && letter.classification) || 'normal';
  var dpt  = (letter && letter.departmentPrefix) || 'الف';
  var sndr = (letter && letter.senderName) || '';

  var html = '<div class="form-grid">';
  html += '<div class="fg"><label class="fl">نوع نامه <span class="req">*</span></label>' +
    '<select class="fs" id="lf-type" onchange="toggleLetterFields()">' +
    '<option value="outgoing"' + (type==='outgoing'?' selected':'') + '>📤 صادره</option>' +
    '<option value="incoming"' + (type==='incoming'?' selected':'') + '>📨 وارده</option>' +
    '<option value="internal"' + (type==='internal'?' selected':'') + '>🏢 داخلی</option>' +
    '</select></div>';

  html += '<div class="fg"><label class="fl">پیشوند (دپارتمان)</label>' +
    '<select class="fs" id="lf-prefix">' +
    ['الف','م','ب','ف','ت','د'].map(function(p){
      return '<option value="' + p + '"' + (dpt===p?' selected':'') + '>' + p + '</option>';
    }).join('') +
    '</select></div>';

  html += '</div>';

  if (isTemplate) {
    html += '<div class="fg" style="margin-top:12px;"><label class="fl">عنوان قالب <span class="req">*</span></label>' +
      '<input class="fi" id="lf-tpl-title" placeholder="عنوان قالب" value="' + esc(subj) + '" /></div>';
  }

  html += '<div class="fg" style="margin-top:12px;"><label class="fl">موضوع <span class="req">*</span></label>' +
    '<input class="fi" id="lf-subject" placeholder="موضوع نامه" value="' + esc(subj) + '" /></div>';

  html += '<div id="lf-sender-row" style="margin-top:12px;display:' + (type==='incoming'?'block':'none') + ';">' +
    '<div class="fg"><label class="fl">فرستنده خارجی</label>' +
    '<input class="fi" id="lf-sender" placeholder="نام سازمان / شخص فرستنده" value="' + esc(sndr) + '" /></div></div>';

  html += '<div class="form-grid" style="margin-top:12px;">';
  html += '<div class="fg"><label class="fl">اولویت</label><select class="fs" id="lf-prio">' +
    '<option value="normal"' + (prio==='normal'?' selected':'') + '>عادی</option>' +
    '<option value="high"' + (prio==='high'?' selected':'') + '>فوری</option>' +
    '<option value="urgent"' + (prio==='urgent'?' selected':'') + '>آنی</option>' +
    '</select></div>';
  html += '<div class="fg"><label class="fl">طبقه‌بندی</label><select class="fs" id="lf-class">' +
    '<option value="normal"' + (cls==='normal'?' selected':'') + '>عادی</option>' +
    '<option value="confidential"' + (cls==='confidential'?' selected':'') + '>محرمانه</option>' +
    '</select></div>';
  html += '</div>';

  html += '<div class="fg" style="margin-top:12px;"><label class="fl">متن نامه</label>' +
    '<textarea class="fta" id="lf-body" rows="8" placeholder="متن نامه را اینجا بنویسید...">' + esc(body) + '</textarea></div>';

  return html;
}

function toggleLetterFields() {
  var type = document.getElementById('lf-type').value;
  var senderRow = document.getElementById('lf-sender-row');
  if (senderRow) senderRow.style.display = type === 'incoming' ? 'block' : 'none';
}

function buildLetterFooter(letter) {
  var isNew = !letter;
  var html = '<button class="btn btn-ghost btn-sm" onclick="closeMo(\'mo-letter\')">انصراف</button>';
  if (isNew || (letter && letter.status === 'draft')) {
    html += '<button class="btn btn-ghost btn-sm" onclick="_saveLetter(true)">ذخیره پیش‌نویس</button>';
    html += '<button class="btn btn-primary btn-sm" onclick="_saveLetter(false)">ذخیره</button>';
  }
  return html;
}

function collectLetterForm() {
  return {
    type:             (document.getElementById('lf-type') || {}).value || 'outgoing',
    subject:          ((document.getElementById('lf-subject') || {}).value || '').trim(),
    body:             ((document.getElementById('lf-body') || {}).value || '').trim(),
    priority:         (document.getElementById('lf-prio') || {}).value || 'normal',
    classification:   (document.getElementById('lf-class') || {}).value || 'normal',
    departmentPrefix: (document.getElementById('lf-prefix') || {}).value || 'الف',
    senderName:       ((document.getElementById('lf-sender') || {}).value || '').trim(),
    title:            ((document.getElementById('lf-tpl-title') || {}).value || '').trim(),
  };
}

async function _saveLetter() {
  var data = collectLetterForm();
  if (!data.subject) return alert('موضوع نامه الزامی است');
  try {
    if (S.editId) {
      await api('PUT', '/letters/' + S.editId, data);
    } else {
      await api('POST', '/letters', data);
    }
    closeMo('mo-letter');
    renderPage(S.page);
  } catch(e) { alert(e.message); }
}

// ── View Letter ────────────────────────────────────────────────────────────
async function openLetterView(id) {
  try {
    var letter = await api('GET', '/letters/' + id);
    var isManager = S.user && (S.user.role === 'مدیر' || S.user.role === 'سوپر ادمین');

    var html = '';

    // Meta
    html += '<div class="form-grid-2" style="margin-bottom:12px;">' +
      '<div><span style="font-size:11px;color:var(--text3);">شماره اندیکاتور</span>' +
      '<div style="font-family:monospace;font-weight:700;margin-top:2px;">' + esc(letter.indicatorNumber || '—') + '</div></div>' +
      '<div><span style="font-size:11px;color:var(--text3);">وضعیت</span><div style="margin-top:2px;">' + statusBadge(letter.status) + '</div></div>' +
      '</div>';

    html += '<div class="form-grid-2" style="margin-bottom:12px;">' +
      '<div><span style="font-size:11px;color:var(--text3);">نوع</span><div style="margin-top:2px;">' + typeBadge(letter.type) + '</div></div>' +
      '<div><span style="font-size:11px;color:var(--text3);">اولویت</span><div style="margin-top:2px;">' + prioBadge(letter.priority) + '</div></div>' +
      '</div>';

    if (letter.type === 'incoming' && letter.senderName) {
      html += '<div style="margin-bottom:10px;font-size:13px;"><strong>فرستنده: </strong>' + esc(letter.senderName) + '</div>';
    }

    html += '<div style="font-size:16px;font-weight:700;margin-bottom:10px;">' + esc(letter.subject) + '</div>';
    html += '<div class="letter-body">' + esc(letter.body || '—') + '</div>';

    // Referral timeline
    if (letter.referrals && letter.referrals.length) {
      html += '<hr class="divider"><div style="font-weight:700;margin-bottom:8px;">📋 سابقه ارجاعات</div>';
      html += '<div class="timeline">';
      letter.referrals.forEach(function(ref) {
        var done = ref.is_completed;
        html += '<div class="tl-item">' +
          '<div class="tl-dot" style="' + (done ? 'background:#dcfce7;border-color:#16a34a;' : 'background:#eff6ff;border-color:#3b82f6;') + '">' +
            (done ? '✓' : '→') + '</div>' +
          '<div class="tl-body">' +
            '<span class="tl-who">' + esc(ref.from_user) + '</span>' +
            ' → <span class="tl-who">' + esc(ref.to_user) + '</span>' +
            '<span class="tl-when">' + fmtDate(ref.created_at) + '</span>' +
            ' ' + actionTypeBadge(ref.action_type) +
            (ref.description ? '<div class="tl-desc">📝 ' + esc(ref.description) + '</div>' : '') +
            (ref.is_completed && ref.completion_note ? '<div class="tl-desc" style="color:var(--success);">✓ ' + esc(ref.completion_note) + '</div>' : '') +
            '</div></div>';
      });
      html += '</div>';

      // Allow completing own referral if not done
      var myRefs = letter.referrals.filter(function(r) {
        return r.to_user === S.user.username && !r.is_completed;
      });
      if (myRefs.length) {
        html += '<div style="margin-top:8px;padding:10px;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);">' +
          '<div style="font-size:12px;font-weight:700;margin-bottom:6px;">اتمام ارجاع:</div>' +
          '<input class="fi" id="complete-note" placeholder="یادداشت اتمام (اختیاری)" style="margin-bottom:8px;" />' +
          '<button class="btn btn-success btn-xs" onclick="_completeRef(\'' + myRefs[0].id + '\')">اتمام ارجاع</button>' +
          '</div>';
      }
    }

    document.getElementById('mo-view-title').textContent = 'نامه: ' + (letter.subject || '');
    document.getElementById('mo-view-body').innerHTML = html;

    // Footer actions
    var footer = '';
    if (letter.status === 'draft' && (isManager || letter.createdBy === S.user.username)) {
      footer += '<button class="btn btn-ghost btn-sm" onclick="openLetterEdit(\'' + id + '\');closeMo(\'mo-view\')">ویرایش</button>';
    }
    if (isManager && letter.status === 'draft') {
      footer += '<button class="btn btn-success btn-sm" onclick="openRegister(\'' + id + '\')">صدور اندیکاتور</button>';
    }
    footer += '<button class="btn btn-ghost btn-sm" onclick="openRefer(\'' + id + '\')">ارجاع</button>';
    if (letter.status !== 'archived') {
      footer += '<button class="btn btn-ghost btn-sm" onclick="archiveLetter(\'' + id + '\')">بایگانی</button>';
    }
    footer += '<button class="btn btn-ghost btn-sm" onclick="printLetter(' + JSON.stringify(letter).replace(/"/g, '&quot;') + ')">چاپ</button>';
    if (letter.status === 'draft' && (isManager || letter.createdBy === S.user.username)) {
      footer += '<button class="btn btn-danger btn-sm" onclick="deleteLetter(\'' + id + '\')">حذف</button>';
    }

    document.getElementById('mo-view-footer').innerHTML = footer;
    openMo('mo-view');

    // Refresh list quietly
    if (S.page === 'inbox') renderInbox();
    loadCounts();
  } catch(e) { alert(e.message); }
}

async function _completeRef(refId) {
  var note = (document.getElementById('complete-note') || {}).value || '';
  try {
    await api('PUT', '/letters/referrals/' + refId + '/complete', { note: note });
    closeMo('mo-view');

    loadCounts();

}

async function _submitRefer() {
  var toUser = (document.getElementById('ref-to') || {}).value;

    await api('POST', '/letters/' + S.referLetterId + '/refer', { toUser, actionType, description });

    openLetterView(S.referLetterId);
  } catch(e) { alert(e.message); }

// ── Print ─────────────────────────────────────────────────────────────────
function printLetter(letter) {
  var TYPE_LABELS = { outgoing: 'نامه صادره', incoming: 'نامه وارده', internal: 'مکاتبه داخلی' };
  var PRIO_LABELS = { normal: 'عادی', high: 'فوری', urgent: 'آنی' };

  var html = '<div class="pz-border">' +
    '<div class="pz-head">' +
      '<div><div class="pz-company">شرکت آتنا زیست درمان</div><div class="pz-sub">سیستم دبیرخونه</div></div>' +
      '<div class="pz-indicator"><div class="pz-ind-no">' + esc(letter.indicatorNumber || '—') + '</div>' +
        '<div class="pz-ind-date">' + fmtDate(letter.registeredAt || letter.createdAt) + '</div></div>' +
    '</div>' +
    '<div class="pz-type-bar">' + (TYPE_LABELS[letter.type] || letter.type) + '</div>' +
    '<div class="pz-meta">' +
      '<div class="pz-meta-row"><span class="pz-meta-key">موضوع:</span><span>' + esc(letter.subject) + '</span></div>' +
      '<div class="pz-meta-row"><span class="pz-meta-key">اولویت:</span><span>' + (PRIO_LABELS[letter.priority] || letter.priority) + '</span></div>' +
      (letter.senderName ? '<div class="pz-meta-row"><span class="pz-meta-key">فرستنده:</span><span>' + esc(letter.senderName) + '</span></div>' : '') +
      '<div class="pz-meta-row"><span class="pz-meta-key">ایجادکننده:</span><span>' + esc(letter.createdBy || '—') + '</span></div>' +
    '</div>' +
    '<div class="pz-body-sec">' + esc(letter.body || '—') + '</div>' +
    '<div class="pz-sigs">' +
      '<div class="pz-sig"><div class="pz-sig-title">تهیه‌کننده</div><div class="pz-sig-name">' + esc(letter.createdBy || '') + '</div><div class="pz-sig-line">امضا</div></div>' +
      '<div class="pz-sig"><div class="pz-sig-title">تأییدکننده</div><div class="pz-sig-name"></div><div class="pz-sig-line">امضا</div></div>' +
      '<div class="pz-sig"><div class="pz-sig-title">مدیر</div><div class="pz-sig-name"></div><div class="pz-sig-line">امضا</div></div>' +
    '</div></div>';

  document.getElementById('pz').innerHTML = html;
  window.print();
}

// ── Modal helpers ──────────────────────────────────────────────────────────
function openMo(id) { document.getElementById(id).classList.add('open'); }
function closeMo(id) { document.getElementById(id).classList.remove('open'); }

// ── Sidebar mobile ─────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('mob-open');
  document.getElementById('sb-overlay').classList.toggle('mob-open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('sb-overlay').classList.remove('mob-open');
}

// ── Badge helpers ──────────────────────────────────────────────────────────
function typeBadge(type) {
  var map = { outgoing:'<span class="badge bb">📤 صادره</span>', incoming:'<span class="badge bp">📨 وارده</span>', internal:'<span class="badge bgr">🏢 داخلی</span>' };
  return map[type] || type;
}
function prioBadge(p) {
  var map = { normal:'<span class="badge bgr">عادی</span>', high:'<span class="badge by">فوری</span>', urgent:'<span class="badge br">آنی</span>' };
  return map[p] || p;
}
function statusBadge(s) {
  var map = { draft:'<span class="badge bgr">پیش‌نویس</span>', registered:'<span class="badge bb">ثبت شده</span>', archived:'<span class="badge bg">بایگانی</span>' };
  return map[s] || s;
}
function actionTypeBadge(a) {
  var map = { for_info:'<span class="badge bgr">جهت اطلاع</span>', for_action:'<span class="badge by">جهت اقدام</span>', for_archive:'<span class="badge bg">جهت بایگانی</span>' };
  return map[a] || a;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtDate(d) {
  if (!d) return '—';
  try {
    return new Date(d).toLocaleDateString('fa-IR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return String(d).slice(0,10); }
}

// ── Start ──────────────────────────────────────────────────────────────────
init();
</script>
